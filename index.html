<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Workflow | Fatima's Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased">

    <!-- Dashboard Container -->
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 border-r border-gray-800 hidden md:flex flex-col justify-between">
            <div class="p-6">
                <div class="text-xl font-bold tracking-wider text-amber-400 mb-10">
                    FATIMA'S <span class="text-white">STUDIO</span>
                </div>
                <nav class="space-y-2">
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-amber-500 text-gray-950 font-semibold transition">
                        <i class="fa-solid fa-chart-pie"></i> Workflow
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-users"></i> Clients
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-video"></i> Production
                    </a>
                </nav>
            </div>
            <div class="p-6 border-t border-gray-800 text-xs text-gray-500">
                Digital Workflow v1.0
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            
            <!-- Top Navbar -->
            <header class="h-20 bg-gray-900/50 backdrop-blur-md border-b border-gray-800 px-8 flex items-center justify-between">
                <h1 class="text-xl font-bold">Project Digital Workflow</h1>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-400">Professional Mode</span>
                    <div class="w-10 h-10 rounded-full bg-amber-500 text-gray-950 font-bold flex items-center justify-center">FS</div>
                </div>
            </header>

            <!-- Dashboard Body -->
            <div class="p-8 max-w-7xl w-full mx-auto space-y-8">
                
                <!-- Action Bar -->
                <div class="flex justify-between items-center bg-gray-900 p-6 rounded-2xl border border-gray-800">
                    <div>
                        <h2 class="text-lg font-bold">Task Manager</h2>
                        <p class="text-sm text-gray-400">Add and track your active digital marketing campaigns & video tasks.</p>
                    </div>
                    <button id="openModalBtn" class="bg-amber-500 hover:bg-amber-600 text-gray-950 font-semibold px-5 py-2.5 rounded-lg transition shadow-lg shadow-amber-500/20">
                        <i class="fa-solid fa-plus mr-2"></i> Add New Task
                    </button>
                </div>

                <!-- Workflow Columns (Kanban Style) -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                    <!-- To Do Column -->
                    <div class="bg-gray-900/60 border border-gray-800 rounded-2xl p-5 flex flex-col h-[500px]">
                        <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-800">
                            <h3 class="font-bold text-amber-400">To Do</h3>
                            <span id="todoCount" class="bg-gray-800 text-xs px-2.5 py-1 rounded-full">0</span>
                        </div>
                        <div id="todoList" class="flex-1 overflow-y-auto space-y-3 pr-1">
                            <!-- Tasks will be injected dynamically -->
                        </div>
                    </div>

                    <!-- In Progress Column -->
                    <div class="bg-gray-900/60 border border-gray-800 rounded-2xl p-5 flex flex-col h-[500px]">
                        <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-800">
                            <h3 class="font-bold text-blue-400">In Progress</h3>
                            <span id="progressCount" class="bg-gray-800 text-xs px-2.5 py-1 rounded-full">0</span>
                        </div>
                        <div id="progressList" class="flex-1 overflow-y-auto space-y-3 pr-1">
                            <!-- Tasks will be injected dynamically -->
                        </div>
                    </div>

                    <!-- Completed Column -->
                    <div class="bg-gray-900/60 border border-gray-800 rounded-2xl p-5 flex flex-col h-[500px]">
                        <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-800">
                            <h3 class="font-bold text-green-400">Completed</h3>
                            <span id="completedCount" class="bg-gray-800 text-xs px-2.5 py-1 rounded-full">0</span>
                        </div>
                        <div id="completedList" class="flex-1 overflow-y-auto space-y-3 pr-1">
                            <!-- Tasks will be injected dynamically -->
                        </div>
                    </div>

                </div>

            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl max-w-md w-full p-6 space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold">Create New Workflow Task</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form id="taskForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Task Title</label>
                    <input type="text" id="taskTitle" required class="w-full bg-gray-950 border border-gray-800 rounded-lg px-4 py-2.5 focus:outline-none focus:border-amber-400" placeholder="e.g., Run FB Ad Campaign">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Category</label>
                    <select id="taskCategory" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-4 py-2.5 focus:outline-none focus:border-amber-400">
                        <option value="Digital Marketing">Digital Marketing</option>
                        <option value="AI Video Production">AI Video Production</option>
                        <option value="Graphic Design">Graphic Design</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Status</label>
                    <select id="taskStatus" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-4 py-2.5 focus:outline-none focus:border-amber-400">
                        <option value="todo">To Do</option>
                        <option value="progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-gray-950 font-bold py-3 rounded-lg transition">Save Task</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
